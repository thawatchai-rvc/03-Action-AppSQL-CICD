apiVersion: apps/v1
kind: Deployment
metadata:
  name: appsql-deployment
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: appsql
  template:
    metadata:
      labels:
        app: appsql
    spec:
      containers:
        - name: appsql
          image: thawatchai95/appsql:sha-64beda6bf800ca1773bae2fa04e7b6f7a42e2d09
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: appsql-secret
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: appsql-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: appsql-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appsql-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
