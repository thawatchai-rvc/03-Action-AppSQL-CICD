# argocd-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: AppSQL
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thawatchai-rvc/03-Action-AppSQL-CICD.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true      # ลบ resource ที่ไม่อยู่ใน Git
      selfHeal: true   # แก้ไขถ้ามีคนไปแก้ใน cluster
    syncOptions:
    - CreateNamespace=true